name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install coverage

      - name: Compile source
        run: python -m compileall src

      - name: Run tests with coverage
        run: coverage run --source=src/qtbot -m unittest discover -s tests -p "test_*.py"

      - name: Coverage report
        run: |
          coverage report --show-missing --fail-under=85
          coverage xml

      - name: Run offline staging validation command
        run: |
          python -m qtbot staging-validate --offline-only --budget 1000 --cadence-seconds 1 --min-loops 1 --timeout-seconds 30

      - name: Upload coverage xml
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t simplequanttrade:ci .

      - name: Validate container CLI lifecycle commands with persistent runtime mount
        run: |
          rm -rf runtime_ci
          mkdir -p runtime_ci
          docker run --rm -v "$PWD/runtime_ci:/app/runtime" simplequanttrade:ci status >/tmp/qtbot-status.json
          docker run --rm -v "$PWD/runtime_ci:/app/runtime" simplequanttrade:ci pause
          grep -q '"command": "PAUSE"' runtime_ci/control.json
          docker run --rm -v "$PWD/runtime_ci:/app/runtime" simplequanttrade:ci resume
          grep -q '"command": "RUN"' runtime_ci/control.json
          docker run --rm -v "$PWD/runtime_ci:/app/runtime" simplequanttrade:ci stop
          grep -q '"command": "STOP"' runtime_ci/control.json

      - name: Validate docker compose file
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml config >/tmp/docker-compose.resolved.yml
